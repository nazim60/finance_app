name: finance_app
description: Offline-first AI personal finance app
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Local storage (offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0
  
  # Firebase backend
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  
  # AI & ML
  tflite_flutter: ^0.10.0
  
  # Voice input
  speech_to_text: ^6.6.0
  
  # OCR
  google_mlkit_text_recognition: ^0.11.0
  image_picker: ^1.0.5
  
  # UI
  fl_chart: ^0.66.0
  intl: ^0.18.1
  lottie: ^2.7.0
  
  # Utilities
  equatable: ^2.0.5
  uuid: ^4.2.1
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/   # for tflite model
    - assets/animations/
